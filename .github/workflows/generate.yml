name: daily epg and playlist generation

on:
  schedule:
    # runs at 00:00 utc every day
    - cron: '0 0 * * *'
  # allows you to trigger it manually from the actions tab just in case
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: run generation script
        # navigating to the script folder to run your python file
        run: python scripts/generate.py

      - name: commit and push changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          # option 1: purely your name (uncomment the user_name and user_email below)
          # commit_user_name: "shannon"
          # commit_user_email: "your-verified-github-email@example.com"
          
          # option 2: keep the bot as the committer, but co-author it!
          commit_user_name: "github-actions[bot]"
          commit_user_email: "github-actions[bot]@users.noreply.github.com"
          commit_message: |
            chore: automated epg and playlist update [skip ci]
            
            
            Co-authored-by: shannon <fonsekashannonshiwantha@gmail.com>